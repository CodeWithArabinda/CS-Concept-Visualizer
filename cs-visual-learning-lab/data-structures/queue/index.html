<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Visualizer - CS Visual Learning Lab</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Shared Visualizer Styles -->
    <link rel="stylesheet" href="../../visualizer.css">
    <style>
        .queue-track {
            height: 120px;
            width: 100%;
            max-width: 800px;
            border-top: 4px dashed var(--border-color);
            border-bottom: 4px dashed var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 40px;
            gap: 15px;
            position: relative;
            background: var(--icon-bg);
            border-radius: 1rem;
            min-height: 150px;
        }
        .queue-element {
            min-width: 70px;
            height: 70px;
            background-color: var(--accent-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 1rem;
            font-weight: 800;
            font-size: 1.4rem;
            box-shadow: 0 8px 15px var(--shadow-color);
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }
        @keyframes enqueueAnim {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .enqueue-active { animation: enqueueAnim 0.5s ease-out forwards; }
        @keyframes dequeueAnim {
            to { transform: translateX(-150px); opacity: 0; }
        }
        .dequeue-active { animation: dequeueAnim 0.5s ease-in forwards; }
        .front-highlight { background-color: #f59e0b !important; transform: scale(1.1); z-index: 20; }
        .pointer-label {
            position: absolute;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
            transition: all 0.5s ease;
        }
        .front-pointer { color: #ef4444; top: -35px; }
        .rear-pointer { color: var(--accent-color); bottom: -35px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="top-nav">
            <a href="../../index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Dashboard
            </a>
            <button class="theme-toggle" id="themeToggle">
                <span id="themeIcon">🌙</span> <span id="themeText">Dark Mode</span>
            </button>
        </nav>

        <!-- Header -->
        <header class="visualizer-header">
            <div class="title-group">
                <h1>Queue</h1>
                <p>First In First Out (FIFO) Principle Simulation</p>
            </div>
            <div class="badge-group">
                <span class="badge badge-blue">Complexity: O(1)</span>
                <span class="badge badge-purple">Type: Linear</span>
            </div>
        </header>

        <main class="main-grid">
            <!-- Controls Panel -->
            <aside class="panel">
                <div class="panel-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></aside>
                    Operations
                </div>
                
                <div class="form-group">
                    <label class="form-label">Data Input</label>
                    <input type="number" id="queueInput" placeholder="Enter value" class="input-field">
                </div>

                <div class="btn-grid">
                    <button onclick="enqueue()" class="btn btn-primary">Enqueue (Add)</button>
                    <button onclick="dequeue()" class="btn btn-outline-red">Dequeue (Remove)</button>
                    <button onclick="peekFront()" class="btn btn-secondary btn-full">Peek Front</button>
                    <button onclick="resetQueue()" class="btn btn-secondary btn-full">Reset Queue</button>
                </div>

                <div class="explanation-area">
                    <div class="panel-title" style="font-size: 0.9rem; opacity: 0.7;">Queue Capacity</div>
                    <div style="font-size: 0.85rem; padding: 0.5rem 0;">
                        <div style="display:flex; justify-content: space-between; margin-bottom: 5px;">
                            <span>Occupancy:</span>
                            <span id="occupancyText" style="font-weight: 700; color: var(--accent-color);">0/8</span>
                        </div>
                        <div style="width: 100%; background: var(--border-color); h-1.5; border-radius: 10px; overflow: hidden; height: 6px;">
                            <div id="progressBar" style="background: var(--accent-color); height: 100%; width: 0%; transition: width 0.5s ease;"></div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Visualizer Canvas -->
            <section class="panel canvas-card">
                <div class="canvas-header">
                    <div class="canvas-title">Memory Visualization</div>
                    <div class="stats-badge">Front end → Exit</div>
                </div>
                
                <div class="visualizer-canvas" style="flex-direction: column;">
                    <div id="queueContainer" class="queue-track"></div>
                </div>

                <!-- Explanation / Log Area -->
                <div style="border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <div class="form-label">Operation History</div>
                    <div id="logArea">
                        <div class="explanation-card">Waiting for commands...</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="toast-container">
        <div class="toast">Action completed</div>
    </div>

    <!-- Scripts -->
    <script src="../../visualizer.js"></script>
    <script>
        const MAX_CAPACITY = 8;
        let queue = [];
        const container = document.getElementById('queueContainer');
        const input = document.getElementById('queueInput');
        const logArea = document.getElementById('logArea');
        const occupancyText = document.getElementById('occupancyText');
        const progressBar = document.getElementById('progressBar');

        function enqueue() {
            const val = input.value.trim();
            if (val === "") { showToast("Enter a value"); return; }
            if (queue.length >= MAX_CAPACITY) { showToast("Queue Full!"); return; }

            queue.push(val);
            input.value = "";
            renderQueue('enqueue');
            addLog(`<strong>Enqueue:</strong> Added ${val} to the rear.`);
            showToast(`Enqueued ${val}`);
        }

        function dequeue() {
            if (queue.length === 0) { showToast("Queue Empty!"); return; }
            const elements = document.querySelectorAll('.queue-element');
            const frontEl = elements[0];
            const val = queue[0];
            frontEl.classList.add('dequeue-active');

            setTimeout(() => {
                queue.shift();
                renderQueue('dequeue');
                addLog(`<strong>Dequeue:</strong> Removed ${val} from the front.`);
                showToast(`Dequeued ${val}`);
            }, 500);
        }

        function peekFront() {
            if (queue.length === 0) { showToast("Queue is empty"); return; }
            const elements = document.querySelectorAll('.queue-element');
            const frontEl = elements[0];
            frontEl.classList.add('front-highlight');
            addLog(`<strong>Front:</strong> First element is ${queue[0]}.`);
            setTimeout(() => frontEl.classList.remove('front-highlight'), 1000);
        }

        function resetQueue() {
            queue = [];
            renderQueue();
            logArea.innerHTML = '';
            showToast("Queue Reset");
        }

        function renderQueue(op) {
            container.innerHTML = '';
            queue.forEach((val, index) => {
                const el = document.createElement('div');
                el.className = 'queue-element';
                el.textContent = val;
                if (op === 'enqueue' && index === queue.length - 1) el.classList.add('enqueue-active');

                if (index === 0) {
                    const front = document.createElement('div');
                    front.className = 'pointer-label front-pointer';
                    front.innerHTML = 'FRONT ↓';
                    el.appendChild(front);
                }
                if (index === queue.length - 1) {
                    const rear = document.createElement('div');
                    rear.className = 'pointer-label rear-pointer';
                    rear.innerHTML = 'REAR ↑';
                    el.appendChild(rear);
                }
                container.appendChild(el);
            });
            occupancyText.textContent = `${queue.length}/${MAX_CAPACITY}`;
            progressBar.style.width = `${(queue.length / MAX_CAPACITY) * 100}%`;
        }

        function addLog(msg) {
            const div = document.createElement('div');
            div.className = 'explanation-card';
            div.innerHTML = msg;
            logArea.prepend(div);
            if (logArea.children.length > 3) logArea.removeChild(logArea.lastChild);
        }

        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') enqueue(); });
    </script>
</body>
</html>
