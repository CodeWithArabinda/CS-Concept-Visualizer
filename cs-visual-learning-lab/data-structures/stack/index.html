<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack Visualizer - CS Visual Learning Lab</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Shared Visualizer Styles -->
    <link rel="stylesheet" href="../../visualizer.css">
    <style>
        .stack-container {
            height: 400px;
            width: 250px;
            border-bottom: 6px solid var(--text-primary);
            border-left: 2px solid var(--border-color);
            border-right: 2px solid var(--border-color);
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            padding-bottom: 4px;
            position: relative;
            background: linear-gradient(to top, var(--icon-bg) 0%, transparent 100%);
        }
        .stack-element {
            width: 90%;
            height: 40px;
            margin-bottom: 4px;
            background-color: var(--accent-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 0.5rem;
            font-weight: 700;
            box-shadow: 0 4px 6px var(--shadow-color);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: elementSlideIn 0.4s ease-out;
            position: relative;
        }
        @keyframes elementSlideIn {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .stack-element.popping { transform: translateX(200px); opacity: 0; }
        .stack-element.peek { background-color: #f59e0b; transform: scale(1.05); }
        .top-pointer {
            position: absolute;
            right: -80px;
            display: flex;
            align-items: center;
            color: #ef4444;
            font-weight: 800;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="top-nav">
            <a href="../../index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Dashboard
            </a>
            <button class="theme-toggle" id="themeToggle">
                <span id="themeIcon">🌙</span> <span id="themeText">Dark Mode</span>
            </button>
        </nav>

        <!-- Header -->
        <header class="visualizer-header">
            <div class="title-group">
                <h1>Stack</h1>
                <p>Last In First Out (LIFO) Simulation</p>
            </div>
            <div class="badge-group">
                <span class="badge badge-blue">Complexity: O(1)</span>
                <span class="badge badge-purple">Type: Linear</span>
            </div>
        </header>

        <main class="main-grid">
            <!-- Controls Panel -->
            <aside class="panel">
                <div class="panel-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                    Operations
                </div>
                
                <div class="form-group">
                    <label class="form-label">Data Input</label>
                    <input type="number" id="stackInput" placeholder="Enter a value" class="input-field">
                </div>

                <div class="btn-grid">
                    <button onclick="push()" class="btn btn-primary">Push (Add)</button>
                    <button onclick="pop()" class="btn btn-outline-red">Pop (Remove)</button>
                    <button onclick="peek()" class="btn btn-secondary btn-full">Peek (Top)</button>
                    <button onclick="resetStack()" class="btn btn-secondary btn-full">Reset Stack</button>
                </div>

                <div class="explanation-area">
                    <div class="panel-title" style="font-size: 0.9rem; opacity: 0.7;">Stack Info</div>
                    <div style="display:flex; justify-content: space-between; font-size: 0.85rem; padding: 0.5rem 0;">
                        <span>Current Size:</span>
                        <span id="stackSize" style="font-weight: 700; color: var(--accent-color);">0</span>
                    </div>
                </div>
            </aside>

            <!-- Visualizer Canvas -->
            <section class="panel canvas-card">
                <div class="canvas-header">
                    <div class="canvas-title">Memory Visualization</div>
                    <div class="stats-badge">Max Capacity: 8</div>
                </div>
                
                <div class="visualizer-canvas">
                    <div id="stackContainer" class="stack-container"></div>
                </div>

                <!-- Explanation / Log Area -->
                <div style="border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <div class="form-label">Operation History</div>
                    <div id="logArea">
                        <div class="explanation-card">Awaiting operations...</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="toast-container">
        <div class="toast">Action completed</div>
    </div>

    <!-- Scripts -->
    <script src="../../visualizer.js"></script>
    <script>
        const MAX_SIZE = 8;
        let stack = [];
        const container = document.getElementById('stackContainer');
        const input = document.getElementById('stackInput');
        const sizeDisplay = document.getElementById('stackSize');
        const logArea = document.getElementById('logArea');

        function push() {
            const val = input.value;
            if (val === "") { showToast("Enter a value"); return; }
            if (stack.length >= MAX_SIZE) { showToast("Stack Overflow!"); return; }

            stack.push(val);
            input.value = "";
            renderStack();
            addLog(`<strong>Push:</strong> Added ${val} to the top.`);
            showToast(`Pushed ${val}`);
        }

        function pop() {
            if (stack.length === 0) { showToast("Stack Underflow!"); return; }
            const elements = document.querySelectorAll('.stack-element');
            const topEl = elements[elements.length - 1];
            topEl.classList.add('popping');

            setTimeout(() => {
                const poppedValue = stack.pop();
                renderStack();
                addLog(`<strong>Pop:</strong> Removed ${poppedValue}.`);
                showToast(`Popped ${poppedValue}`);
            }, 400);
        }

        function peek() {
            if (stack.length === 0) { showToast("Stack is empty"); return; }
            const elements = document.querySelectorAll('.stack-element');
            const topEl = elements[elements.length - 1];
            topEl.classList.add('peek');
            addLog(`<strong>Peek:</strong> Top value is ${stack[stack.length - 1]}.`);
            setTimeout(() => topEl.classList.remove('peek'), 1000);
        }

        function resetStack() {
            stack = [];
            renderStack();
            logArea.innerHTML = '';
            showToast("Stack Reset");
        }

        function renderStack() {
            container.innerHTML = '';
            stack.forEach((val, index) => {
                const el = document.createElement('div');
                el.className = 'stack-element';
                el.textContent = val;
                if (index === stack.length - 1) {
                    const pointer = document.createElement('div');
                    pointer.className = 'top-pointer';
                    pointer.innerHTML = '← TOP';
                    el.appendChild(pointer);
                }
                container.appendChild(el);
            });
            sizeDisplay.textContent = stack.length;
        }

        function addLog(message) {
            const div = document.createElement('div');
            div.className = 'explanation-card';
            div.innerHTML = message;
            logArea.prepend(div);
            if (logArea.children.length > 3) logArea.removeChild(logArea.lastChild);
        }

        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') push(); });
    </script>
</body>
</html>
